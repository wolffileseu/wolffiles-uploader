name: Release MSIX

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on: git tag v1.2.3 && git push --tags

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Windows App SDK workload
        run: dotnet workload install windows

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $csproj = Get-Content "WolffilesUploader.csproj" -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$version</Version>"
          $csproj | Set-Content "WolffilesUploader.csproj"

      - name: Build MSIX (x64)
        run: |
          dotnet publish WolffilesUploader.csproj `
            -c Release `
            -r win-x64 `
            -p:PublishSingleFile=false `
            -p:WindowsPackageType=MSIX `
            -o publish/x64

      - name: Build portable ZIP (x64)
        run: |
          dotnet publish WolffilesUploader.csproj `
            -c Release `
            -r win-x64 `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:WindowsPackageType=None `
            -o publish/portable

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path "publish/portable/*" `
            -DestinationPath "publish/WolffilesUploader-$version-portable-x64.zip"

      - name: Generate .appinstaller
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = @"
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller
              xmlns="http://schemas.microsoft.com/appx/appinstaller/2018"
              Uri="https://wolffiles.eu/downloads/wolffiles-uploader.appinstaller"
              Version="$version.0">
            <MainPackage
              Name="WolffilesUploader"
              Version="$version.0"
              Publisher="CN=Wolffiles"
              ProcessorArchitecture="x64"
              Uri="https://wolffiles.eu/downloads/WolffilesUploader-$version-x64.msix" />
            <UpdateSettings>
              <OnLaunch HoursBetweenUpdateChecks="24" ShowPrompt="true" />
            </UpdateSettings>
          </AppInstaller>
          "@
          $content | Set-Content "publish/wolffiles-uploader.appinstaller"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Wolffiles Uploader v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🐺 Wolffiles Uploader v${{ steps.version.outputs.VERSION }}

            ### Installation
            - **Windows Installer (.appinstaller):** [wolffiles.eu/downloads](https://wolffiles.eu/downloads)
            - **Portable ZIP:** Direkt aus diesem Release herunterladen

            ### Automatische Updates
            Wenn du die `.appinstaller` Version verwendest, werden Updates automatisch erkannt.
          files: |
            publish/x64/*.msix
            publish/WolffilesUploader-*-portable-x64.zip
            publish/wolffiles-uploader.appinstaller
          draft: false
          prerelease: false

      - name: Deploy to wolffiles.eu/downloads
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: publish/
          server-dir: /httpdocs/downloads/
          include: |
            *.msix
            *.zip
            *.appinstaller
